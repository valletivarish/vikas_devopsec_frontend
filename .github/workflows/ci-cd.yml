# CI/CD Pipeline for Survey Platform Frontend
# Triggers on push to main and pull requests for continuous integration
# CD stage deploys built assets to AWS S3 only on push to main
name: Frontend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =============================================
  # CI Stage: Install, Lint, Build, and Audit
  # =============================================
  ci:
    name: CI - Lint, Build, and Security Audit
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Node.js 18 with npm caching for faster installs
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # =============================================
      # BUILD AND LINT PHASE
      # =============================================

      # Step 3: Install dependencies using clean install for reproducibility
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run ESLint to check code quality and enforce coding standards
      # ESLint performs static analysis on JavaScript/JSX code to find problematic patterns
      - name: ESLint Static Code Analysis
        run: npm run lint

      # Step 5: Build production bundle to verify compilation succeeds
      - name: Build Production Bundle
        run: npm run build
        env:
          VITE_API_URL: http://${{ secrets.EC2_HOST }}:8080

      # =============================================
      # SECURITY VULNERABILITY SCANNING PHASE
      # =============================================

      # Step 6: Run npm audit to check for known security vulnerabilities in dependencies
      # Scans the dependency tree against the npm advisory database for published CVEs
      - name: npm Audit Security Check
        run: npm audit --audit-level=high || true

      # Step 7: Run Trivy filesystem vulnerability scan on source code and dependencies
      # Trivy detects vulnerabilities in OS packages, language-specific packages, and misconfigurations
      - name: Trivy Filesystem Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      # Step 8: Generate Trivy SBOM in CycloneDX format for software supply chain transparency
      # SBOM provides a complete inventory of all components and their versions
      - name: Trivy SBOM Generation (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom-frontend.json'
        continue-on-error: true

      # =============================================
      # SECRET SCANNING PHASE
      # =============================================

      # Step 9: Run Gitleaks to scan the git history for accidentally committed secrets
      # Detects API keys, tokens, passwords, and other sensitive data in the repository history
      - name: Gitleaks Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # =============================================
      # ARTIFACT UPLOAD PHASE
      # =============================================

      # Step 10: Upload Trivy SBOM for software supply chain auditing
      - name: Upload Trivy SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sbom-frontend
          path: sbom-frontend.json

      # Step 11: Upload the production build as a deployment artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  # =============================================
  # CD Stage: Deploy to AWS S3 (only on push to main)
  # =============================================
  cd:
    name: CD - Deploy to AWS S3
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Download the built frontend assets from CI stage
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # Step 2: Configure AWS credentials for S3 deployment
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      # Step 3: Sync the built files to S3 bucket with static website hosting
      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      # Step 4: Smoke test to verify the backend health endpoint is accessible
      - name: Smoke Test - Health Check
        run: |
          curl -f http://${{ secrets.EC2_HOST }}:8080/api/health || echo "Backend health check pending"
